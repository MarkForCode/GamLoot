<!-- Login Form -->
<form class="flex flex-col gap-md">
<!-- Email Input -->
<div class="flex flex-col gap-xs">
<label class="font-label-caps text-label-caps text-on-surface-variant" for="email">Email Address</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant" style="font-variation-settings: 'FILL' 0;">mail</span>
<input class="w-full bg-[#1E1E1E] border-none border-b-2 border-b-outline-variant text-on-surface font-body-md text-body-md py-sm pl-10 pr-3 rounded-t-DEFAULT focus:ring-0 focus:border-b-primary-container transition-colors" id="email" placeholder="commander@guild.com" type="email"/>
</div>
</div>
<!-- Password Input -->
<div class="flex flex-col gap-xs">
<label class="font-label-caps text-label-caps text-on-surface-variant" for="password">Password</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant" style="font-variation-settings: 'FILL' 0;">lock</span>
<input class="w-full bg-[#1E1E1E] border-none border-b-2 border-b-outline-variant text-on-surface font-body-md text-body-md py-sm pl-10 pr-3 rounded-t-DEFAULT focus:ring-0 focus:border-b-primary-container transition-colors" id="password" placeholder="••••••••" type="password"/>
</div>
</div>
<!-- Remember Me & Forgot Password -->
<div class="flex justify-between items-center mt-sm">
<label class="flex items-center gap-xs cursor-pointer group">
<div class="relative flex items-center justify-center">
<input class="peer appearance-none w-4 h-4 border border-outline-variant rounded-sm bg-[#1E1E1E] checked:bg-primary-container checked:border-primary-container focus:ring-offset-background focus:ring-primary-container transition-all" type="checkbox"/>
<span class="material-symbols-outlined absolute text-[12px] text-[#0A0A0A] opacity-0 peer-checked:opacity-100 pointer-events-none" style="font-variation-settings: 'FILL' 1;">check</span>
</div>
<span class="font-body-sm text-body-sm text-on-surface-variant group-hover:text-on-surface transition-colors">Remember credentials</span>
</label>
<a class="font-label-caps text-label-caps text-primary-container hover:text-primary-fixed transition-colors" href="#">Forgot Password?</a>
