services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: gam_trade
      POSTGRES_PASSWORD: gam_trade_secure_pass
      POSTGRES_DB: gam_trade_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./seed:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gam_trade -d gam_trade_dev"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  user-api:
    build:
      context: .
      dockerfile: rust/services/user-api/Dockerfile
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://gam_trade:gam_trade_secure_pass@postgres:5432/gam_trade_dev
      REDIS_URL: redis://redis:6379

  cms-api:
    build:
      context: .
      dockerfile: rust/services/cms-api/Dockerfile
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://gam_trade:gam_trade_secure_pass@postgres:5432/gam_trade_dev
      REDIS_URL: redis://redis:6379

  order-worker:
    build:
      context: .
      dockerfile: rust/workers/order/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://gam_trade:gam_trade_secure_pass@postgres:5432/gam_trade_dev
      REDIS_URL: redis://redis:6379

  payment-worker:
    build:
      context: .
      dockerfile: rust/workers/payment/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://gam_trade:gam_trade_secure_pass@postgres:5432/gam_trade_dev
      REDIS_URL: redis://redis:6379

  notification-worker:
    build:
      context: .
      dockerfile: rust/workers/notification/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://gam_trade:gam_trade_secure_pass@postgres:5432/gam_trade_dev
      REDIS_URL: redis://redis:6379

  user-web:
    build:
      context: .
      dockerfile: apps/user/web/Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      user-api:
        condition: service_started
    environment:
      USER_API_URL: http://user-api:8080
      NEXT_PUBLIC_API_URL: http://user-api:8080
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/health >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 10

  admin-web:
    build:
      context: .
      dockerfile: apps/admin/web/Dockerfile
    ports:
      - "3001:3001"
    depends_on:
      cms-api:
        condition: service_started
    environment:
      CMS_API_URL: http://cms-api:8081
      NEXT_PUBLIC_CMS_API_URL: http://cms-api:8081
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3001/health >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 10

  user-app:
    build:
      context: .
      dockerfile: apps/user/app/Dockerfile
    ports:
      - "8082:8081"
      - "19000:19000"
      - "19001:19001"
      - "19002:19002"
      - "19006:19006"
    depends_on:
      user-api:
        condition: service_started
    environment:
      EXPO_NO_TELEMETRY: "1"
      CI: "1"
      USER_API_URL: http://user-api:8080
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8081 >/dev/null 2>&1"]
      interval: 15s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
  redis_data:
